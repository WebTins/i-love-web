<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/inputs.css">
</head>
<body>

    <label for="email">Voer je email-adres in:</label>
    <input type="email" id="email" pattern=".+@example\.com" size="30" placeholder="mijn@voorbeeld.com" required />

    <label for="telefoon">
        Voer je telefoonnummer in:<br />
        <small>Formaat: 06 12 34 56 78</small>
        <input
            type="tel"
            id="telefoon"
            name="telefoon"
            pattern="[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}"
            placeholder="Telefoonnummer"
            required
        />

    </label>

    <form>
        <label for="url">Voer een https:// url link:</label>
        <input
            type="url"
            name="url"
            id="url"
            placeholder="https://voorbeeld.com"
            pattern="https://.*"
            size="30"
            required
            />
    </form>
</body>
</html>
